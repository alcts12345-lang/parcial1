<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración de Recursos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">
    <header class="header">
        <h1>ADMINISTRACIÓN DE RECURSOS</h1>
    </header>

    <div class="contenido">
        <div class="panel-izq">
            <h3>CIERRE DE GESTION</h3>
            <button>Cerrar Gestión</button>
            <button>Cambiar Gestión</button>
            <hr>
            <button>Importar/Exportar</button>
            <button>Índices UFV</button>
            <button>Seguridad</button>
            <button>Re-indexar</button>
            <button class="activo">Migrador</button>
        </div>
        <div class="panel-der">
            <input type="text" value="2013" class="input-ano">

            <textarea></textarea>
            <div class="popup">
                <div class="popup-header">Microsoft Visual FoxPro</div>
                <p>¿Es usted el único usuario del sistema?</p>
                <div class="botones">
                    <button class="si">Sí</button>
                    <button>No</button>
                </div>
            </div>

        </div>

    </div>

    <footer class="footer">
        <button>Salir</button>
    </footer>

</div>

</body>
</html>
